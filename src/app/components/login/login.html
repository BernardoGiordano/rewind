<div class="min-h-dvh flex flex-col bg-white dark:bg-slate-950">
  <!-- Top bar — branding + dark mode toggle -->
  <div class="flex items-center justify-between px-6 py-4 lg:px-10 lg:py-6">
    <h1 class="font-mono font-bold text-slate-900 dark:text-white tracking-tight text-base lg:text-lg">
      Navidrome Rewind
    </h1>
    <button
      type="button"
      (click)="toggleDarkMode()"
      class="cursor-pointer flex items-center justify-center w-9 h-9 rounded-full text-slate-600 dark:text-slate-300 bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors"
      [attr.aria-label]="darkMode() ? 'Switch to light mode' : 'Switch to dark mode'"
    >
      @if (darkMode()) {
        <ng-icon name="heroSun" class="w-4 h-4" aria-hidden="true" />
      } @else {
        <ng-icon name="heroMoon" class="w-4 h-4" aria-hidden="true" />
      }
    </button>
  </div>

  <!-- Card -->
  <div class="flex-1 flex items-center justify-center px-4 pb-10">
    <div class="w-full max-w-sm">
      <div class="rounded-2xl bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 shadow-sm p-6 sm:p-8">
        <div class="mb-6">
          <h2 class="text-xl font-semibold text-slate-900 dark:text-white">Sign in</h2>
          <p class="mt-1 text-sm text-slate-500 dark:text-slate-400">
            Use your Navidrome username and password.
          </p>
        </div>

        <form (submit)="submit($event)" class="space-y-4" novalidate>
          <!-- Username -->
          <div>
            <label for="username" class="block text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400 mb-1.5">
              Username
            </label>
            <div class="relative">
              <span class="pointer-events-none absolute inset-y-0 left-3 flex items-center text-slate-400 dark:text-slate-500">
                <ng-icon name="heroUser" class="w-4 h-4" aria-hidden="true" />
              </span>
              <input
                id="username"
                name="username"
                type="text"
                autocomplete="username"
                spellcheck="false"
                autocapitalize="off"
                required
                [ngModel]="username()"
                (ngModelChange)="username.set($event)"
                [disabled]="submitting()"
                class="w-full pl-9 pr-3 py-2.5 rounded-lg bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-sm text-slate-900 dark:text-slate-100 placeholder:text-slate-400 dark:placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-slate-900 dark:focus:ring-white transition-colors disabled:opacity-60"
                placeholder="username"
              />
            </div>
          </div>

          <!-- Password -->
          <div>
            <label for="password" class="block text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400 mb-1.5">
              Password
            </label>
            <div class="relative">
              <span class="pointer-events-none absolute inset-y-0 left-3 flex items-center text-slate-400 dark:text-slate-500">
                <ng-icon name="heroLockClosed" class="w-4 h-4" aria-hidden="true" />
              </span>
              <input
                id="password"
                name="password"
                [type]="showPassword() ? 'text' : 'password'"
                autocomplete="current-password"
                required
                [ngModel]="password()"
                (ngModelChange)="password.set($event)"
                [disabled]="submitting()"
                class="w-full pl-9 pr-10 py-2.5 rounded-lg bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-sm text-slate-900 dark:text-slate-100 placeholder:text-slate-400 dark:placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-slate-900 dark:focus:ring-white transition-colors disabled:opacity-60"
                placeholder="••••••••"
              />
              <button
                type="button"
                (click)="togglePassword()"
                [attr.aria-label]="showPassword() ? 'Hide password' : 'Show password'"
                class="cursor-pointer absolute inset-y-0 right-2 flex items-center px-1.5 text-slate-400 dark:text-slate-500 hover:text-slate-700 dark:hover:text-slate-200 transition-colors"
              >
                @if (showPassword()) {
                  <ng-icon name="heroEyeSlash" class="w-4 h-4" aria-hidden="true" />
                } @else {
                  <ng-icon name="heroEye" class="w-4 h-4" aria-hidden="true" />
                }
              </button>
            </div>
          </div>

          @if (error()) {
            <div
              role="alert"
              class="flex items-start gap-2 rounded-lg bg-red-50 dark:bg-red-950/40 border border-red-200 dark:border-red-900/60 px-3 py-2 text-sm text-red-700 dark:text-red-300"
            >
              <ng-icon name="heroExclamationCircle" class="w-4 h-4 mt-0.5 shrink-0" aria-hidden="true" />
              <span>{{ error() }}</span>
            </div>
          }

          <button
            type="submit"
            [disabled]="submitting()"
            class="w-full cursor-pointer flex items-center justify-center gap-2 px-4 py-2.5 rounded-lg bg-slate-900 dark:bg-white text-white dark:text-slate-900 text-sm font-semibold hover:bg-slate-800 dark:hover:bg-slate-100 transition-colors disabled:opacity-60 disabled:cursor-not-allowed"
          >
            @if (submitting()) {
              <span class="inline-block w-4 h-4 border-2 border-white/40 dark:border-slate-900/40 border-t-white dark:border-t-slate-900 rounded-full animate-spin" aria-hidden="true"></span>
              Signing in…
            } @else {
              Sign in
            }
          </button>
        </form>
      </div>

      <p class="mt-6 text-center text-xs text-slate-400 dark:text-slate-500">
        Your credentials are sent to your Navidrome server for verification.
      </p>
    </div>
  </div>
</div>
